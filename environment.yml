name: HGCLR
channels:
  - pytorch
  - defaults
  - conda-forge
dependencies:
  - python=3.8
  - pip
  # fairseq==0.10.0 usa np.float, removido no NumPy >= 1.24.
  # Mantenha numpy < 1.24 (testado com 1.23.5).
  - numpy=1.23.5
  - tqdm
  # A100 tem CUDA capability sm_80, suportado apenas a partir do
  # CUDA 11.0. Por isso usamos cudatoolkit=11.1 (a combinação oficial
  # do PyTorch 1.8.1 mais próxima que cobre sm_80), em vez de 10.2.
  - pytorch=1.8.1
  - cudatoolkit=11.1
  - pip:
      - transformers==4.2.1
      - fairseq==0.10.0
      # torch-scatter, torch-sparse e torch-geometric precisam ser
      # instalados com wheels compiladas para a versão exata do
      # PyTorch + CUDA usada acima. Ajuste a URL abaixo (cu102, cu111,
      # cpu, etc.) conforme:
      # https://pytorch-geometric.com/whl/
      - --find-links=https://data.pyg.org/whl/torch-1.8.1+cu111.html
      - torch-scatter==2.0.8
      - torch-sparse==0.6.12
      - torch-geometric==1.7.2
      # ranx traz numba como dependência (numba>=0.54.1) e é
      # resolvido automaticamente pelo pip.
      - ranx
      - hydra-core