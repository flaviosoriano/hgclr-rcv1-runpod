name: Publish HGCLR Runpod image

on:
  # The standard Runpod-image bootstrap is the operational deployment path.
  # Build the large legacy Conda image only on an explicit fallback request.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-hgclr-rcv1-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/flaviosoriano/hgclr-rcv1

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout the pinned source revision
        uses: actions/checkout@v4

      - name: Reclaim hosted-runner disk before the Conda image build
        # HGCLR's legacy Conda environment is large. GitHub-hosted runners
        # ship unused Android/.NET/Swift toolchains; deleting them before
        # BuildKit starts prevents the Docker overlay from exhausting root FS.
        run: |
          set -euxo pipefail
          df -h
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /usr/local/share/powershell /usr/share/swift
          sudo docker system prune --all --force --volumes
          sudo apt-get clean
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/runpod-hgclr/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            HGCLR_REVISION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=HGCLR RCV1 Runpod
