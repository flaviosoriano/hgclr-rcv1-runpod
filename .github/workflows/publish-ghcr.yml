name: Publish HGCLR Runpod image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-hgclr-rcv1-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/flaviosoriano/hgclr-rcv1

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout the pinned source revision
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/runpod-hgclr/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            HGCLR_REVISION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=HGCLR RCV1 Runpod
